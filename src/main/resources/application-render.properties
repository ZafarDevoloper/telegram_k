# ???????????????????????????????????????????????????????????????????
#  Render.com uchun Spring Profile
#  Fayl joyi: src/main/resources/application-render.properties
#  Bu fayl faqat SPRING_PROFILES_ACTIVE=render bo'lganda ishlatiladi
# ???????????????????????????????????????????????????????????????????

# ??? Server ?????????????????????????????????????????????????????????
server.port=${PORT:10000}

# ??? Ma'lumotlar bazasi ??????????????????????????????????????????????
# Render PostgreSQL URL ni "postgres://" formatda beradi
# Spring "jdbc:postgresql://" formatini kutadi ? shuning uchun konvertatsiya
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# SSL (Render PostgreSQL uchun shart)
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ??? JWT (environment variable dan) ?????????????????????????????????
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ??? Telegram ????????????????????????????????????????????????????????
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}
telegram.admin.chat.ids=${TELEGRAM_ADMIN_CHAT_IDS}

# ??? Fayl saqlash ????????????????????????????????????????????????????
# Render free tier da disk o'zgaruvchan (restart bo'lsa fayl yo'qoladi)
# Production da S3 yoki Cloudinary ishlatish tavsiya etiladi
file.upload-dir=/app/uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ??? CORS ????????????????????????????????????????????????????????????
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ??? IP Whitelist (Render da o'chiriq) ???????????????????????????????
security.ip-whitelist.enabled=false

# ??? Logging ?????????????????????????????????????????????????????????
logging.level.root=WARN
logging.level.com.example.demo=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.servlet.resource.NoResourceFoundException=OFF
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# ??? Actuator ????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ??? Bot restart notify ??????????????????????????????????????????????
bot.restart-notify.enabled=true